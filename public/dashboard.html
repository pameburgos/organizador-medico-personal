<!--shift + tab-->
<!doctype html>
<html lang="es">
  <!--español-->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizador</title>
    <!--buscador-->

    <!--tailwind-->
    <script src="https://cdn.tailwindcss.com"></script>
    <!--tabler icons-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <!--mi css-->
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>

  <body class="min-h-screen">
    <div class="flex min-h-screen">
      <!--barra lateral o sidebar-->
      <aside
        class="w-48 flex-shrink-0 bg-pink-100 border-r border-pink-200 flex flex-col py-6"
      >
        <div class="px-5 pb-5 mb-4 border-b border-pink-200">
          <h1 class="text-base font-semibold text-pink-700">Organizador</h1>
        </div>

        <nav class="flex flex-col gap-1">
          <a href="dashboard.html" class="nav-link active">
            <i class="ti ti-layout-dashboard"></i>
            General
          </a>

          <a href="especialidades.html" class="nav-link">
            <i class="ti ti-stethoscope"></i>
            Especialidades
          </a>

          <a href="consultas.html" class="nav-link">
            <i class="ti ti-calendar-event"></i>
            Consultas
          </a>

          <a href="documentos.html" class="nav-link">
            <i class="ti ti-file-description"></i>
            Documentos
          </a>

          <a href="medicamentos.html" class="nav-link">
            <i class="ti ti-pill"></i>
            Medicamentos
          </a>

          <a href="alertas.html" class="nav-link">
            <i class="ti ti-bell"></i>
            Alertas
          </a>
        </nav>
      </aside>

      <!--contenido principal-->
      <div class="flex-1 flex flex-col">
        <!--barra de herramientas o topbar-->
        <div
          class="bg-pink-100 border-b border-pink-200 px-6 py-4 flex items-center justify-between"
        >
          <div>
            <h2 class="text-lg font-semibold text-pink-800">Pamela Burgos</h2>

            <span class="text-sm text-pink-500">
              Organizador Médico Personal
            </span>
          </div>

          <i class="ti ti-heart text-pink-400 text-xl"></i>
          <!--corazoncito-->
        </div>

        <main class="p-6 flex flex-col gap-6">
          <!--tarjetas-->
          <div class="reveal grid grid-cols-2 sm:grid-cols-4 gap-4">
            <!--especialidades-->
            <a href="especialidades.html"
              class="bg-pink-200 border border-pink-200 rounded-2xl p-4 flex flex-col gap-2 cursor-pointer hover:scale-105 transition no-underline"
            >
              <i class="ti ti-stethoscope text-pink-400 text-xl"></i>
              <span class="card-title text-xs text-gray-500"
                >Especialidades</span
              >
              <span
                class="text-3xl font-semibold text-pink-700"
                id="cantEspecialidades"
                >0</span
              >
            </a>

            <!--consultas-->
            <a href="consultas.html"
	            class="bg-orange-200 border border-orange-200 rounded-2xl p-4 flex flex-col gap-2 cursor-pointer hover:scale-105 transition no-underline">

              <i class="ti ti-calendar-event text-orange-400 text-xl"></i>
              <span class="card-title text-xs text-gray-500">Consultas</span>
              <span
                class="text-3xl font-semibold text-orange-700"
                id="cantConsultas"
                >0</span
              >
            </a>

            <!--documentos-->
            <a href="documentos.html"
	            class="bg-red-200 border border-red-200 rounded-2xl p-4 flex flex-col gap-2 cursor-pointer hover:scale-105 transition no-underline">

              <i class="ti ti-folder text-red-400 text-xl"></i>
              <span class="card-title text-xs text-gray-500">Documentos</span>
              <span
                class="text-3xl font-semibold text-red-700"
                id="cantDocumentos"
                >0</span
              >
            </a>

            <!--medicamentos-->
            <a href="medicamentos.html"
	          class="bg-purple-200 border border-purple-200 rounded-2xl p-4 flex flex-col gap-2 cursor-pointer hover:scale-105 transition no-underline">

            <i class="ti ti-pill text-purple-400 text-xl"></i>
              <span class="card-title text-xs text-gray-500">Medicamentos</span>
              <span
                class="text-3xl font-semibold text-purple-700"
                id="cantMedicamentos"
                >0</span
              >
            </a>

            <!--alertas-->
            <a href="alertas.html"
	            class="bg-emerald-200 border border-emerald-200 rounded-2xl p-4 flex flex-col gap-2 cursor-pointer hover:scale-105 transition no-underline">

              <i class="ti ti-bell text-emerald-400 text-xl"></i>
              <span class="card-title text-xs text-gray-500">Alertas</span>
              <span
                class="text-3xl font-semibold text-emerald-700"
                id="cantAlertas"
                >0</span
              >
            </a>

            <!--otros-->
            <a href="otros.html"
	            class="bg-blue-200 border border-blue-200 rounded-2xl p-4 flex flex-col gap-2 cursor-pointer hover:scale-105 transition no-underline">

              <i class="ti ti-candy text-blue-400 text-xl"></i>
              <span class="card-title text-xs text-gray-500">Otros</span>
              <span
                class="text-3xl font-semibold text-blue-700"
                id="cantOtros"
                >0</span
              >
            </a>

          </div>

          <!--paneles-->
          <div class="reveal grid sm:grid-cols-2 gap-4">
            <!--consultas-->
            <div class="bg-white border border-pink-200 rounded-2xl p-5">
              <h3
                class="text-sm font-semibold text-pink-700 mb-4 flex items-center gap-2"
              >
                <i class="ti ti-calendar-event"></i>
                Próximas Consultas
              </h3>

              <ul class="flex flex-col gap-3 text-sm text-gray-600" id="listaProximas">
                <li class="text-gray-400">Cargando…</li>
              </ul>
            </div>

            <!--alertas-->
            <div class="bg-white border border-pink-200 rounded-2xl p-5">
              <h3
                class="text-sm font-semibold text-pink-700 mb-4 flex items-center gap-2"
              >
                <i class="ti ti-bell"></i>
                Alertas Recientes
              </h3>

              <ul class="flex flex-col gap-3 text-sm text-gray-600" id="listaAlertas">
                <li class="text-gray-400">Cargando…</li>
              </ul>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!--js propio-->
    <script src="/js/reveal.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
